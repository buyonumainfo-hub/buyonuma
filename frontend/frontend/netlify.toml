[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy API requests to your backend
[[redirects]]
  from = "/api/*"
  to = "https://lens-university-market-place-alpha.vercel.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://lens-university-market-place-alpha.vercel.app/uploads/:splat"
  status = 200
  force = true
