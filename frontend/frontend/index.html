<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA primary meta -->
    <meta name="application-name" content="BuyOnUma" />
    <meta name="description" content="The official marketplace for buyers and sellers — browse sellers, products and connect on WhatsApp." />
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="UMA" />

    <!-- Open Graph (looks good when shared) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BuyOnUma" />
    <meta property="og:description" content="browse sellers, products and connect on WhatsApp." />
    <meta property="og:url" content="/" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />

    <!-- iOS splash screens (optional but improves launch UX) -->
    <meta name="apple-touch-startup-image" content="/icons/icon-512x512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

    <title>Universal market access</title>

     <script>
      (function() {
        try {
          var saved = localStorage.getItem('buyonuma_theme');
          var theme = saved === 'dark' || saved === 'light'
            ? saved
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
